description: "Farmer John 计划为奶牛们新开办一所大学！ \n\n![](https://cdn.luogu.com.cn/upload/image_hosting/wiy5l6d6.png)\n\
  \n有 $N(1 \\le N \\le 10^5)$ 头奶牛可能会入学。每头奶牛最多愿意支付 $c_i$ 的学费 $(1 \\le c_i \\le 10^6)$。\
  \ Farmer John 可以设定所有奶牛入学需要支付的学费。如果这笔学费大于一头奶牛愿意支付的最高金额，那么这头奶牛就不会入学。Farmer John 想赚尽可能多的钱，从而可以给他的讲师提供一笔可观的工资。请求出他能赚到的钱的数量，以及此时应当收取多少学费。"
