problem: P11449
title: '[USACO24DEC] Roundabount Rounding B'
tags:
- 数学
description: '奶牛 Bessie 回到学校了！她开始做她的数学作业，在作业中她被要求将正整数四舍五入到 $10$ 的幂。


  要将一个正整数 $a$ 四舍五入到最接近的 $10^b$，其中 $b$ 为正整数，Bessie 首先找到从右往左数第 $b$ 个数位。令 $x$ 为这个数位。


  如果 $x≥5$，Bessie 将 $a$ 增加 $10^b$。


  然后，Bessie 将从右侧开始直至第 $b$ 个数位的所有数位均设置为 $0$。


  例如，如果 Bessie 想要将 $456$ 四舍五入到最接近的 $10^2$（百位），Bessie 会首先找到从右往左数第 $2$ 个数位 $5$。这意味着
  $x=5$。然后由于 $x≥5$，Bessie 将 $a$ 增加 $100$。最后，Bessie 将 $a$ 中从右侧开始直至第 $2$ 个数位的所有数位设置为
  $0$，结果为 $500$。


  但是，如果 Bessie 将 $446$ 四舍五入到最接近的 $10^2$，她将得到 $400$。


  在看了 Bessie 的作业后，Elsie 认为她已经发明了一种新的舍入方式：链式舍入。要链式舍入到最接近的 $10^b$，Elsie 将首先舍入到最接近的 $10^1$，然后舍入到最接近的
  $10^2$

  ，以此类推，直至舍入到最接近的 $10^b$。


  Bessie 认为 Elsie 是错误的，但她太忙于数学作业，无法确认她的怀疑。她请你计算出存在多少个不小于 $2$ 且不超过 $N$ 的整数 $x$（$1≤N≤10^9$），使得将
  $x$ 四舍五入到最接近的 $10^P$ 与链式舍入到最接近的 $10^P$ 的结果不同，其中 $P$ 是满足 $10^P≥x$ 的最小整数。'
