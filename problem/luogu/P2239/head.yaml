problem: P2239
title: '[NOIP 2014 普及组] 螺旋矩阵'
tags:
- 模拟
- 数学
description: "一个 $n$ 行 $ n$ 列的螺旋矩阵可由如下方法生成：\n\n\n从矩阵的左上角（第 $1$ 行第 $1$ 列）出发，初始时向右移动；如果前方是未曾经过的格子，则继续前进，否则右转；重复上述操作直至经过矩阵中所有格子。根据经过顺序，在格子中依次填入\
  \ $1, 2, 3, \\dots, n^2$，便构成了一个螺旋矩阵。\n\n\n下图是一个 $n = 4$ 时的螺旋矩阵。\n\n$$\\begin{pmatrix}\n\
  \ 1 &    2  &   3   &  4 \\\\\n12 &   13  &  14   &  5 \\\\\n11 &   16  &  15  \
  \ &  6 \\\\\n10 &    9  &   8   &  7 \\\\\n\\end{pmatrix}$$\n\n现给出矩阵大小 $n$ 以及 $i$\
  \ 和 $j$，请你求出该矩阵中第 $i$ 行第 $j$ 列的数是多少。"
difficulty: 普及
