problem: P8090
title: '[USACO22JAN] Herdle B'
tags:
- 模拟
description: '奶牛们发明了一种名为 Herdle 的新型解谜游戏，在牛界引起了轰动。


  每天都会有一个新谜题发布供奶牛解决。游戏采用 $3\times 3$ 方阵的形式表示农场的一块田地，田地的每个方格都由特定品种的奶牛占据。总共只有 $26$ 种可能的品种，每一种由
  $\text{A}$ 到 $\text{Z}$ 中的不同大写字母标识。玩家不会被告知田地中的奶牛品种排列方式——游戏目标是通过一系列猜测确定它们。


  每次猜测，奶牛们输入一个 $3\times 3$ 的大写字母方阵，表示该田地可以用奶牛填充的可能方式。猜测的某些方格可能是正确的。这些方格以绿色高亮显示，让奶牛们知道这些是正确的。猜测的另一些方格可能填入了品种正确但位置错误的奶牛。这些以黄色高亮显示。


  黄色高亮显示的方格的数量可以帮助指示某个品种的奶牛数量。 例如，假设猜测方阵包含 $4$ 头品种 $\text{A}$ 的奶牛，而答案方阵包含 $2$ 只品种
  $\text{A}$ 的奶牛，其中没有正确位置上的 $\text{A}$ （即，它们都不应该是绿色的）。 在这种情况下，猜测方阵中只有两个 $\text{A}$
  应以黄色高亮显示。 更准确地说，如果猜测方阵中有 $x$ 个特定品种的奶牛，并且 答案方阵中有 $y \le x$ 头该品种奶牛（不包括位置正确而得到绿色高亮显示的奶牛），那么猜测方阵的
  $x$ 头奶牛中只有 $y$ 头奶牛应该以黄色高亮显示。


  给定正确答案的方阵和一个表示对该答案的猜测的方阵，请计算绿色和黄色高亮显示的方格的数量。'
