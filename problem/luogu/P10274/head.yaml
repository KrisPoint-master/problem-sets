description: 'Farmer John 有一个布尔语句，包含 $N$ 个关键字（$1\le N<2\cdot 10^5$，$N$ 为奇数）。奇数位置仅出现
  $\texttt{true}$ 或 $\texttt{false}$，偶数位置上仅出现 $\texttt{and}$ 或 $\texttt{or}$。


  一个 $x \operatorname{OPERATOR} y$ 形式的短语，其中 $x$ 和 $y$ 为 $\texttt{true}$ 或 $\texttt{false}$，而
  $\operatorname{OPERATOR}$ 为 $\texttt{and}$ 或 $\texttt{or}$ ，按如下规则求值：


  - $x \operatorname{and} y$：如果 $x$ 和 $y$ 均为 $\texttt{true}$，则求值结果为 $\texttt{true}$，否则为
  $\texttt{false}$。

  - $x \operatorname{or} y$：如果 $x$ 或 $y$ 为 $\texttt{true}$，则求值结果为 $\texttt{true}$，否则为
  $\texttt{false}$。


  在求值该语句时，FJ 必须考虑 Moo 语言中的运算符优先级。与 C++ 类似，$\operatorname{and}$ 优先级高于 $\operatorname{or}$。更具体地说，在求值该语句时，重复以下步骤直至该语句仅包含一个关键字。


  1. 如果语句中包含 $\operatorname{and}$，选择其中任意一个，并将其周围的短语替换为其求值结果。

  2. 否则，该语句包含 $\operatorname{or}$。选择其中任意一个，并将其周围的短语替换为其求值结果。


  可以证明，如果在指定的一个步骤中可以求值多个短语，那么选择哪一个求值并不重要；该语句最终的求值结果将始终相同。


  FJ 有 $Q$（$1\le Q\le 2\cdot 10^5$）个询问。在每个询问中，他给你两个整数 $l$ 和 $r$（$1\le l\le r\le N$，$l$
  和 $r$ 均为奇数），并删除关键字 $l$ 到关键字 $r$ 之间的段。反过来，他希望用一个简单的 $\texttt{true}$ 或 $\texttt{false}$
  替换他刚刚删除的段，以使整个语句的求值结果为某个指定的布尔值。帮助 FJ 判断是否可行！'
