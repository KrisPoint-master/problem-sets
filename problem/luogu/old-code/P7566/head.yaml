problem: P7566
title: 饱食
tags: []
description: '书虫背包里有 $n$ 只兔兔，第 $i$ 只兔兔被书虫编号为一个由大写字母组成的字符串 $S_i$。


  书虫会 +C+，他用 +C+ 编写出了 `random` 函数，随机抽取出了三只兔兔。


  不过书虫暂时得了神经性厌食症，书虫能吃下这三只兔兔当且仅当：


  - 编号的首字母为 `M`，`C`，`O` 或 `I` 中的任意一个。

  - 编号的首字母不能相同。


  书虫想问有多少种选择方案使得他能吃下他选的的三只兔兔？'
