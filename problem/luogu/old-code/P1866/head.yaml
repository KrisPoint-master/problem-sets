problem: P1866
title: 编号
tags:
- 数学
- 递推
- 排序
description: '太郎有 $N$ 只兔子，现在为了方便识别它们，太郎要给他们编号。兔子们向太郎表达了它们对号码的喜好，每个兔子 $i$ 想要一个整数，介于
  $1$ 和 $M_i$ 之间（可以为 $1$ 或 $M_i$）。当然，每个兔子的编号是不同的。现在太郎想知道一共有多少种编号的方法。


  你只用输出答案对 $10^9+7$ 取余的结果即可。如果这是不可能的，就输出 $0$。'
