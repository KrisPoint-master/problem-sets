description: '小可可想计算所有不大于 $x$ 的正整数的立方根下取整之和，但是她不会做，你能帮帮她吗？


  为了彻底帮小可可弄懂这个问题，你需要回答 $q$ 组询问，对于每组询问给定的一个正整数 $x_i$，输出：


  $$\sum _{j=1} ^{x_i} \lfloor j^{\frac{1}{3}} \rfloor$$


  其中，$\lfloor x \rfloor$ 表示不大于 $x$ 的最大整数。'
