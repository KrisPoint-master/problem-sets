title: '[CSP-S 2020] 动物园'
tags:
- 数学
- 贪心
- 进制
description: "动物园里饲养了很多动物，饲养员小 A 会根据饲养动物的情况，按照《饲养指南》购买不同种类的饲料，并将购买清单发给采购员小 B。 \n\n\
  具体而言，动物世界里存在 $2^k$ 种不同的动物，它们被编号为 $0 \\sim 2^k - 1$。动物园里饲养了其中的 $n$ 种，其中第 $i$ 种动物的编号为\
  \ $a_i$。\n\n《饲养指南》中共有 $m$ 条要求，第 $j$ 条要求形如“如果动物园中饲养着某种动物，满足其编号的二进制表示的第 $p_j$ 位为 $1$，则必须购买第\
  \ $q_j$ 种饲料”。其中饲料共有 $c$ 种，它们从 $1 \\sim c$ 编号。本题中我们将动物编号的二进制表示视为一个 $k$ 位 01 串，第 $0$\
  \ 位是最低位，第 $k - 1$ 位是最高位。 \n\n根据《饲养指南》，小 A 将会制定饲料清单交给小 B，由小 B 购买饲料。清单形如一个 $c$ 位 $01$\
  \ 串，第 $i$ 位为 $1$ 时，表示需要购买第 $i$ 种饲料；第 $i$ 位为 $0$ 时，表示不需要购买第 $i$ 种饲料。 实际上根据购买到的饲料，动物园可能可以饲养更多的动物。更具体地，如果将当前未被饲养的编号为\
  \ $x$ 的动物加入动物园饲养后，饲料清单没有变化，那么我们认为动物园当前还能饲养编号为 $x$ 的动物。\n\n现在小 B 想请你帮忙算算，动物园目前还能饲养多少种动物。"
