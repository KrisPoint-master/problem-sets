oj: luogu
problem: P3984
title: 高兴的津津
tags:
- 模拟
- 数学
description: 津津上高中了。她在自己的妈妈的魔鬼训练下，成为了一个神犇，每次参加一次 OI 比赛必拿 Au 虐全场。每次她拿到一个 Au 后就很高兴。假设津津不会因为其它事高兴，并且她的高兴会持续
  $T$ 天（包含获奖当天。就算在高兴的时候再次拿到 Au，她的高兴也只能维持包括这次拿奖之日起 $T$ 天，而不是额外增加 $T$ 天的高兴时间，除非之后再拿奖）。请你帮忙检查一下津津接下来的的日程安排，要参加
  $n$ 场比赛，看看接下来的几天，津津会累计开心多久？
