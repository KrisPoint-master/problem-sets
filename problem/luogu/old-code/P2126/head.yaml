description: mzc 家很有钱（开玩笑），他家有 $n$ 个男家丁，现在 mzc 要将他们全都聚集起来（干什么就不知道了）。现在知道 mzc 与男家丁们互相之间通信的时间，请算出把他们每个人叫到需要的总时间（要重复的哦）。保证能把他们每个人叫到。
