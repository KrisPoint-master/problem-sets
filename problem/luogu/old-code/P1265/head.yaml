oj: luogu
problem: P1265
title: 公路修建
tags:
- 图论
description: "某国有 $n$ 个城市，它们互相之间没有公路相通，因此交通十分不便。为解决这一“行路难”的问题，政府决定修建公路。修建公路的任务由各城市共同完成。\n\
  \n修建工程分若干轮完成。在每一轮中，每个城市选择一个与它最近的城市，申请修建通往该城市的公路。政府负责审批这些申请以决定是否同意修建。\n\n政府审批的规则如下：\n\
  \n1. 如果两个或以上城市申请修建同一条公路，则让它们共同修建；\n2. 如果三个或以上的城市申请修建的公路成环。如下图，A 申请修建公路 AB，B 申请修建公路\
  \ BC，C 申请修建公路 CA。则政府将否决其中最短的一条公路的修建申请； \n3. 其他情况的申请一律同意。\n\n![](https://cdn.luogu.com.cn/upload/image_hosting/apng39qc.png)\n\
  \n一轮修建结束后，可能会有若干城市可以通过公路直接或间接相连。这些可以互相连通的城市即组成“城市联盟”。在下一轮修建中，每个“城市联盟”将被看作一个城市，发挥一个城市的作用。\n\
  \n当所有城市被组合成一个“城市联盟”时，修建工程也就完成了。\n\n你的任务是根据城市的分布和前面讲到的规则，计算出将要修建的公路总长度。"
difficulty: 普及+/提高
