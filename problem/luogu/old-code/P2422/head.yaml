title: 良好的感觉
tags:
- 线段树
- 二分
- 前缀和
description: kkk 做了一个人体感觉分析器。每一天，人都有一个感受值 $A_i$，$A_i$ 越大，表示人感觉越舒适。在一段时间 $\left[i,
  j\right]$ 内，人的舒适程度定义为 $\left[i, j\right]$ 中最不舒服的那一天的感受值 $\times$ $\left[i, j\right]$中每一天感受值的和。现在给出
  kkk 在连续 $N$ 天中的感受值，请问，在哪一段时间，kkk 感觉最舒适？
difficulty: 普及+/提高
