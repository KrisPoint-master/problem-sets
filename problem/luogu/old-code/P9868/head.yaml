problem: P9868
title: '[NOIP2023] 词典'
tags:
- 贪心
- O2优化
description: '小 S 的词典里有 $n$ 个两两不同的、长度均为 $m$ 的单词 $w_1,w_2,\cdots,w_n$。每个单词都是一个小写字母构成的字符串。


  小 S 可以做以下操作任意多次（可以不做）：选择词典中的任意一个单词，交换其中任意两个字符。


  对于每个 $1 \le i \le n$，小 S 想知道，是否可以通过以上操作得到新的 $n$ 个单词 $w''_1,w''_2,\cdots , w''_n$，使得对于每个
  $j \neq i$，$w''_i$ 的字典序比 $w''_j$ 都要小。**对于 $n=1$ 的情况，我们约定：上述性质是自然成立的。**


  对于两个同样长度的字符串 $s = s_1s_2\cdots s_L$ 和 $t = t_1t_2 \cdots t_L$，称字符串 $s$ 字典序小于字符串
  $t$，当且仅当以下条件成立：存在位置 $i$，在第 $i$ 个字符之前 $s$ 和 $t$ 都相同，而且 $s_i < t_i$，即小写字母 $s_i$ 在英文字母顺序中先于
  $t_i$。'
difficulty: 普及-
