problem: P1304
title: 哥德巴赫猜想
tags:
- 搜索
- 数学
- 素数判断
description: 输入一个偶数 $N$，验证 $4\sim N$ 所有偶数是否符合哥德巴赫猜想：任一大于 $2$ 的偶数都可写成两个质数之和。如果一个数不止一种分法，则输出第一个加数相比其他分法最小的方案。例如
  $10$，$10=3+7=5+5$，则 $10=5+5$ 是错误答案。
