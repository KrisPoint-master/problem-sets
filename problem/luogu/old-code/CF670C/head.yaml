problem: CF670C
title: Cinema
tags: []
description: "莫斯科在举办一场重要的有 $n$ 个不同国家的珂学家参与的国际会议，每个珂学家都只会一种语言。为了方便起见，我们规定一种语言用 $1$\
  \ 到 $10^9$ 的数来描述。 \n\n在会议之后的晚上，珂学家们决定去看电影。他们去的电影院有 $m$ 场电影，每场有两个不同的数字，分别代表配音的语言和字幕的语言。如果一个珂学家能听懂配音，他会非常愉悦；如果能看懂字幕，他会比较满意。如果既看不懂也听不懂，他会很生气。\
  \ \n\n珂学家们决定去看同一场电影，你必须帮助他们选择一场电影，让愉悦的人最多的前提下，比较满意的人最多。"
difficulty: 普及-
