description: '小 P 从同学小 Q 那儿借来一副 $n$ 张牌的扑克牌。


  本题中我们不考虑大小王，此时每张牌具有两个属性：花色和点数。花色共有 $4$ 种：方片、草花、红桃和黑桃。点数共有 $13$ 种，从小到大分别为 $\tt{A
  2 3 4 5 6 7 8 9 T J Q K}$。注意：点数 $10$ 在本题中记为 $\tt T$。


  我们称一副扑克牌是**完整**的，当且仅当对于每一种花色和每一种点数，都**恰好**有一张牌具有对应的花色和点数。由此，一副完整的扑克牌恰好有 $4 \times
  13 = 52$ 张牌。以下图片展示了一副完整的扑克牌里所有的 52 张牌。


  ![](https://cdn.luogu.com.cn/upload/image_hosting/qj53w3yq.png)


  小 P 借来的牌可能不是完整的，为此小 P 准备再向同学小 S 借若干张牌。可以认为小 S 每种牌都有无限张，因此小 P 可以任意选择借来的牌。小 P 想知道他至少得向小
  S 借多少张牌，才能让从小 S 和小 Q 借来的牌中，可以选出 $52$ 张牌构成一副完整的扑克牌。


  为了方便你的输入，我们使用字符 $\tt D$ 代表方片，字符 $\tt C$ 代表草花，字符 $\tt H$ 代表红桃，字符 $\tt S$ 代表黑桃，这样每张牌可以通过一个长度为
  $2$ 的字符串表示，其中第一个字符表示这张牌的花色，第二个字符表示这张牌的点数，例如 $\tt{CA}$ 表示草花 $\tt A$，$\tt{ST}$ 表示黑桃
  $\tt T$（黑桃 10）。'
