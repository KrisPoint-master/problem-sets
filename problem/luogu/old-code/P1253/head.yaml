description: '给定一个长度为 $n$ 的序列 $a$，要求支持如下三个操作：


  1. 给定区间 $[l, r]$，将区间内每个数都修改为 $x$。

  2. 给定区间 $[l, r]$，将区间内每个数都加上 $x$。

  3. 给定区间 $[l, r]$，求区间内的最大值。'
