problem: P2758
title: 编辑距离
tags:
- 字符串
- DP
- 数学
description: '设 $A$ 和 $B$ 是两个字符串。我们要用最少的字符操作次数，将字符串 $A$ 转换为字符串 $B$。这里所说的字符操作共有三种：


  1. 删除一个字符；

  2. 插入一个字符；

  3. 将一个字符改为另一个字符。


  $A, B$ 均只包含小写字母。'
