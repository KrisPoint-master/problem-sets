title: '[科大国创杯初中组 2025] 足球联赛'
tags:
- 模拟
description: '小可可正在研究 W 市的足球联赛。


  W 市的足球联赛有 $n$ 支球队，球队编号分别为 $1, 2, 3 \ldots n$，每个赛季，球队之间会进行比赛。


  已知本赛季进行了 $m$ 场比赛，第 $i$ 场是 $a_i, b_i$ 两支球队进行比赛，并且比分是 $c_i : d_i$，根据比分判定胜负，从而影响积分。


  1. 如果 $c_i > d_i$，则 $a_i$ 球队获胜。

  2. 如果 $c_i < d_i$，则 $b_i$ 球队获胜。

  3. 如果 $c_i = d_i$，则 $a_i$ 和 $b_i$ 球队平局。


  赛后积分变化：每场比赛如果分出胜负，则胜者得 3 分，败者不得分；否则平局双方各得 1 分。


  需要求出 $m$ 场比赛后每支球队的积分。'
