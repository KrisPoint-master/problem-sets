problem: P11853
title: '[CSP-J 2022 山东] 植树节'
tags: []
description: '植树节快要到了，学校要组织志愿者去给树苗浇水。


  有一排树苗，编号依次是 $0,1,2,\dots$。


  现有 $n$ 个志愿者去给树苗浇水，第 $i$ 个志愿者选定了一个区间 $\left[a_{i},b_{i}\right]$ ，表示第 $i$ 个志愿者将 $\left[a_{i},b_{i}\right]$
  这一区间内的每一棵树都浇一次水。


  如某个志愿者选择的浇水区间为 $\left[4,9\right]$ ，表示他将给编号为 $4,5,6,7,8,9$ 的树各浇水一次。


  当所有的志愿者完成各自所选区间的浇水后，可能有些树苗被不同的志愿者浇水多次，也可能有的树苗一次也没被浇过水。


  请你求出浇水最多的树苗被浇了多少次。'
difficulty: 普及-
