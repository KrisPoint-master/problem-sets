oj: luogu
problem: P1271
title: 【深基9.例1】选举学生会
tags:
- 排序
description: 学校正在选举学生会成员，有 $n$（$1 \le n\le 999$）名候选人，每名候选人编号分别从 $1$ 到 $n$，现在收集到了 $m$（$1
  \le m \le 2000000$）张选票，每张选票都写了一个候选人编号。现在想把这些堆积如山的选票按照投票数字从小到大排序。设第 $i$（$1 \le i
  \le m$）张选票上的数字为 $a_i$，则保证有 $1 \le a_i \le n$。
difficulty: 普及-
