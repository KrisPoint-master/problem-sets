title: '[“科大国创杯”2024 年安徽省青少年信息学科普日-初中组] 操作'
tags: []
description: '小可可有一个长度为 $n$ 的初始都为 $0$ 的数组和从左到右的 $m$ 个机器，每个机器 $i$ 都有两种类别之一。若机器 $i$
  是第一种机器，那么它需要执行的操作是将 $a_{x_i}$ 的值加上 $y_i$；如果机器 $i$ 是第二种机器，那么它需要执行的操作是依次执行第 $l_i$
  到第 $r_i$ 个机器的操作，其中有 $r_i$ < $i$。


  需要注意的是，每个第二种机器只会执行它左边机器的操作。


  现在小可可依次执行了机器 $c_1, c_2, \dots , c_k$ 的操作，想知道最后得到的数组是什么。由于数组中的元素可能很大，你只需要帮她求出每个元素除以
  $10007$ 的余数即可。'
difficulty: 普及/提高-
