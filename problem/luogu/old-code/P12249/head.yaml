problem: P12249
title: '[科大国创杯初中组 2025] 果汁'
tags:
- 贪心
description: '小可可买了美味的果汁，但他太懒了，于是要求奶龙给他倒果汁。


  有 $m$ 个水杯，第 $i$ 个水杯容量为 $V_i$。现在有 $n$ 个单位体积的果汁，小可可要求奶龙一共倒 $n$ 次（每次倒一个单位体积，正好倒完），第
  $j$ 次倒果汁只能倒进第 $a_j$ 或 $a_j + 1$ 个水杯。具体的，如果第 $a_j$ 和 $a_j + 1$ 两个水杯都不是满的，那么可以任意倒入其中一个；如果有且仅有一个不是满的，那么只能倒入不是满的的那一个；如果都已经被倒满了，那么小奶龙就可以开心地喝掉这一个单位体积的果汁。并且为了方便，小可可会安排小奶龙从左向右倒果汁，也就是说对于所有
  $1 \leq j < n$，保证 $a_j \leq a_{j+1}$。


  小奶龙想知道自己最多能喝掉单位体积的果汁，你能帮帮他吗？


  你一共需要解决 $T$ 组测试数据。'
difficulty: 普及-
