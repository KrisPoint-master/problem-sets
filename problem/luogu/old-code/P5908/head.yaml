oj: luogu
problem: P5908
title: 猫猫和企鹅
tags:
- 搜索
- BFS
description: '王国里有 $n$ 个居住区，它们之间有 $n-1$ 条道路相连，并且保证从每个居住区出发都可以到达任何一个居住区，并且每条道路的长度都为
  $1$。


  除 $1$ 号居住区外，每个居住区住着一个小企鹅，有一天一只猫猫从 $1$ 号居住区出发，想要去拜访一些小企鹅。可是猫猫非常的懒，它只愿意去距离它不大于 $d$
  的小企鹅们。


  猫猫非常的懒，因此希望你告诉他，他可以拜访多少只小企鹅。'
