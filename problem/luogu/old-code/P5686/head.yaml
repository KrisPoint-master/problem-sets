description: '给定两个下标从 $1$ 到 $n$ 编号的序列 $a_i,b_i$，定义函数 $S(l,r)(1\le l\le r\le n)$ 为：


  $$\sum_{i=l}^r a_i\times \sum_{i=l}^r b_i$$


  请你求出下列式子的值：


  $$\sum_{l=1}^n \sum_{r=l}^n S(l,r)$$


  由于答案可能很大，你只需要给出答案模 $10^9+7$ 后的结果。'
