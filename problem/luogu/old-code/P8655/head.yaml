problem: P8655
title: '[蓝桥杯 2017 国 B] 发现环'
tags: []
description: '小明的实验室有 $N$ 台电脑，编号 $1 \sim N$。原本这 $N$ 台电脑之间有 $N-1$ 条数据链接相连，恰好构成一个树形网络。在树形网络上，任意两台电脑之间有唯一的路径相连。


  不过在最近一次维护网络时，管理员误操作使得某两台电脑之间增加了一条数据链接，于是网络中出现了环路。环路上的电脑由于两两之间不再是只有一条路径，使得这些电脑上的数据传输出现了
  BUG。


  为了恢复正常传输。小明需要找到所有在环路上的电脑，你能帮助他吗？'
difficulty: 普及/提高-
source: https://www.luogu.com.cn/problem/P8655
