oj: luogu
problem: P1157
title: 组合的输出
tags:
- 搜索
- 递归
description: '排列与组合是常用的数学方法，其中组合就是从 $n$ 个元素中抽出 $r$ 个元素（不分顺序且 $r \le n$），我们可以简单地将 $n$
  个元素理解为自然数 $1,2,\dots,n$，从中任取 $r$ 个数。


  现要求你输出所有组合。


  例如 $n=5,r=3$，所有组合为：


  $123,124,125,134,135,145,234,235,245,345$。'
difficulty: 普及-
