title: '[NOIP 2013 提高组] 积木大赛'
tags:
- 模拟
- 贪心
- 递归
description: '春春幼儿园举办了一年一度的“积木大赛”。今年比赛的内容是搭建一座宽度为 $n$ 的大厦，大厦可以看成由 $n$ 块宽度为 $1$ 的积木组成，第
  $i$ 块积木的最终高度需要是 $h_i$。


  在搭建开始之前，没有任何积木（可以看成 $n$ 块高度为 $0$ 的积木）。接下来每次操作，小朋友们可以选择一段连续区间 $[l, r]$，然后将第 $L$ 块到第
  $R$ 块之间（含第 $L$ 块和第 $R$ 块）所有积木的高度分别增加 $1$。


  小 M 是个聪明的小朋友，她很快想出了建造大厦的最佳策略，使得建造所需的操作次数最少。但她不是一个勤于动手的孩子，所以想请你帮忙实现这个策略，并求出最少的操作次数。'
