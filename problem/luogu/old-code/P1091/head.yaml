oj: luogu
problem: P1091
title: '[NOIP 2004 提高组] 合唱队形'
tags:
- DP
- 线性 DP
description: '$n$ 位同学站成一排，音乐老师要请其中的 $n-k$ 位同学出列，使得剩下的 $k$ 位同学排成合唱队形。


  合唱队形是指这样的一种队形：设 $k$ 位同学从左到右依次编号为 $1,2,$ … $,k$，他们的身高分别为 $t_1,t_2,$ … $,t_k$，则他们的身高满足
  $t_1< \cdots <t_i>t_{i+1}>$ … $>t_k(1\le i\le k)$。


  你的任务是，已知所有 $n$ 位同学的身高，计算最少需要几位同学出列，可以使得剩下的同学排成合唱队形。'
