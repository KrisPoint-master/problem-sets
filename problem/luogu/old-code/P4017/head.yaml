description: '给你一个食物网，你要求出这个食物网中最大食物链的数量。


  （这里的“最大食物链”，指的是**生物学意义上的食物链**，即**最左端是不会捕食其他生物的生产者，最右端是不会被其他生物捕食的消费者**。）


  Delia 非常急，所以你只有 $1$ 秒的时间。


  由于这个结果可能过大，你只需要输出总数模上 $80112002$ 的结果。'
