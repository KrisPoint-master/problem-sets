oj: luogu
problem: P1955
title: '[NOI2015] 程序自动分析'
tags:
- 离散化
description: '在实现程序自动分析的过程中，常常需要判定一些约束条件是否能被同时满足。


  考虑一个约束满足问题的简化版本：假设 $x_1,x_2,x_3,\cdots$ 代表程序中出现的变量，给定 $n$ 个形如 $x_i=x_j$ 或 $x_i\neq
  x_j$ 的变量相等/不等的约束条件，请判定是否可以分别为每一个变量赋予恰当的值，使得上述所有约束条件同时被满足。例如，一个问题中的约束条件为：$x_1=x_2,x_2=x_3,x_3=x_4,x_4\neq
  x_1$，这些约束条件显然是不可能同时被满足的，因此这个问题应判定为不可被满足。


  现在给出一些约束满足问题，请分别对它们进行判定。'
difficulty: 普及+/提高
