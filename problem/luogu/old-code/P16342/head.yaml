title: '[科大国创杯初中组 2026] 倍数调整'
tags:
- 数学
- 枚举
description: '小可可有两个正整数 $a, b$。


  定义一次操作为：选择 $a, b$ 的其中一个，并把它 $+1$ 或 $-1$。注意，你需要时刻保证 $a \ge 1, b \ge 1$。


  现在小可可想要通过若干次操作使得 $a$ 是 $b$ 的倍数。那么请你告诉他，他最少要操作多少次呢？'
