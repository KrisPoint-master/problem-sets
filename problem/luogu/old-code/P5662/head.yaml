problem: P5662
title: '[CSP-J 2019] 纪念品'
tags:
- DP
- 背包 DP
description: '小伟突然获得一种超能力，他知道未来 $T$ 天 $N$ 种纪念品每天的价格。某个纪念品的价格是指购买一个该纪念品所需的金币数量，以及卖出一个该纪念品换回的金币数量。


  每天，小伟可以进行以下两种交易**无限次**：

  1. 任选一个纪念品，若手上有足够金币，以当日价格购买该纪念品；

  2. 卖出持有的任意一个纪念品，以当日价格换回金币。


  每天卖出纪念品换回的金币可以**立即**用于购买纪念品，当日购买的纪念品也可以**当日卖出**换回金币。当然，一直持有纪念品也是可以的。


  $T$ 天之后，小伟的超能力消失。因此他一定会在第 $T$ 天卖出**所有**纪念品换回金币。


  小伟现在有 $M$ 枚金币，他想要在超能力消失后拥有尽可能多的金币。'
difficulty: 普及+/提高
