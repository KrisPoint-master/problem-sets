problem: P14357
title: '[CSP-J 2025] 拼数'
tags:
- 贪心
- O2优化
- 排序
description: 小 R 正在学习字符串处理。小 X 给了小 R 一个字符串 $s$，其中 $s$ 仅包含小写英文字母及数字，且**包含至少一个 $1 \sim
  9$ 中的数字**。小 X 希望小 R 使用 $s$ 中的任意多个数字，按任意顺序拼成一个正整数。**注意：小 R 可以选择 $s$ 中相同的数字，但每个数字只能使用一次**。例如，若
  $s$ 为 $\tt 1a01b$，则小 R 可以同时选择第 $1,3,4$ 个字符，分别为 $1,0,1$，拼成正整数 $101$ 或 $110$；但小 R
  不能拼成正整数 $111$，因为 $s$ 仅包含两个数字 $1$。小 R 想知道，在他所有能拼成的正整数中，最大的是多少。你需要帮助小 R 求出他能拼成的正整数的最大值。
difficulty: 普及-
