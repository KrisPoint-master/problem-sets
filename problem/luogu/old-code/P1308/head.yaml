oj: luogu
problem: P1308
title: '[NOIP 2011 普及组] 统计单词数'
tags:
- 模拟
- 字符串
description: '一般的文本编辑器都有查找单词的功能，该功能可以快速定位特定单词在文章中的位置，有的还能统计出特定单词在文章中出现的次数。


  现在，请你编程实现这一功能，具体要求是：给定一个单词，请你输出它在给定的文章中出现的次数和第一次出现的位置。注意：匹配单词时，不区分大小写，但要求完全匹配，即给定单词必须与文章中的某一独立单词在不区分大小写的情况下完全相同（参见样例
  1），如果给定单词仅是文章中某一单词的一部分则不算匹配（参见样例 2）。'
difficulty: 普及-
