description: 'CSP-J 2025 第二轮正在进行。小 R 所在的考场共有 $n \times m$ 名考生，其中所有考生的 CSP-J 2025 第一轮成绩**互不相同**。所有
  $n \times m$ 名考生将按照 CSP-J 2025 第一轮的成绩，**由高到低蛇形分配座位**，排列成 $n$ **行** $m$ **列**。具体地，设小
  R 所在的考场的所有考生的成绩**从高到低**分别为 $s_1 > s_2 > \dots > s_{n \times m}$，则成绩为 $s_1$ 的考生的座位为第
  $1$ **列**第 $1$ **行**，成绩为 $s_2$ 的考生的座位为第 $1$ **列**第 $2$ **行**，$\dots$，成绩为 $s_n$ 的考生的座位为第
  $1$ **列**第 $n$ **行**，成绩为 $s_{n+1}$ 的考生的座位为第 $2$ **列**第 $n$ **行**，$\dots$，成绩为 $s_{2n}$
  的考生的座位为第 $2$ **列**第 $1$ **行**，成绩为 $s_{2n+1}$ 的考生的座位为第 $3$ **列**第 $1$ **行**，以此类推。


  例如，若 $n = 4, m = 5$，则所有 $4 \times 5 = 20$ 名考生将按照 CSP-J 2025 第一轮成绩从高到低的顺序，根据下图中的箭头顺序分配座位。


  :::align{center}

  ![](https://cdn.luogu.com.cn/upload/image_hosting/hfprtmco.png)

  :::


  给定小 R 所在的考场座位的**行数** $n$ 与**列数** $m$，以及小 R 所在的考场的所有考生 CSP-J 2025 第一轮的成绩 $a_1, a_2,
  \dots, a_{n \times m}$，其中 $a_1$ 为小 R CSP-J 2025 第一轮的成绩，你需要帮助小 R 求出，他的座位为第几**列**第几**行**。'
