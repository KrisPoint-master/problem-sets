problem: P1204
title: '[USACO1.2] 挤牛奶 Milking Cows'
tags:
- 模拟
- 线段树
- 排序
description: "三个农民每天清晨 $5$ 点起床，然后去牛棚给三头牛挤奶。\n\n第一个农民在 $300$ 秒（从 $5$ 点开始计时）给他的牛挤奶，一直到\
  \ $1000$ 秒。第二个农民在 $700$ 秒开始，在 $1200$ 秒结束。第三个农民在 $1500$ 秒开始，$2100$ 秒结束。  \n\n期间最长的至少有一个农民在挤奶的连续时间为\
  \ $900$ 秒（从 $300$ 秒到 $1200$ 秒），而最长的无人挤奶的连续时间（从挤奶开始一直到挤奶结束）为 $300$ 秒（从 $1200$ 秒到\
  \ $1500$ 秒）。\n\n---\n你的任务是编一个程序，读入一个有 $n$ 个农民挤 $n$ 头牛的工作时间列表，计算以下两点（均以秒为单位）：\n\n\
  1. 最长至少有一人在挤奶的时间段。\n2. 最长的无人挤奶的时间段。（从有人挤奶开始算起）"
difficulty: 普及-
