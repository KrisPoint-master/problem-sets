problem: P1616
title: 疯狂的采药
tags:
- DP
- 背包 DP
description: 'LiYuxiang 是个天资聪颖的孩子，他的梦想是成为世界上最伟大的医师。为此，他想拜附近最有威望的医师为师。医师为了判断他的资质，给他出了一个难题。医师把他带到一个到处都是草药的山洞里对他说：“孩子，这个山洞里有一些不同种类的草药，采每一种都需要一些时间，每一种也有它自身的价值。我会给你一段时间，在这段时间里，你可以采到一些草药。如果你是一个聪明的孩子，你应该可以让采到的草药的总价值最大。”


  如果你是 LiYuxiang，你能完成这个任务吗？


  此题和原题的不同点：


  $1$. 每种草药可以无限制地疯狂采摘。


  $2$. 药的种类眼花缭乱，采药时间好长好长啊！师傅等得菊花都谢了！'
