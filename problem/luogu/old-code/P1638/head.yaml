problem: P1638
title: 逛画展
tags:
- 二分
description: '博览馆正在展出由世上最佳的 $m$ 位画家所画的图画。


  游客在购买门票时必须说明两个数字，$x$ 和 $y$，代表他要看展览中的第 $x$ 幅至第 $y$ 幅画（包含 $x,y$）之间的所有图画，而门票的价钱就是一张图画一元。


  Sept 希望入场后可以看到所有名师的图画。当然，他想最小化购买门票的价格。


  请求出他购买门票时应选择的 $x,y$，数据保证一定有解。


  若存在多组解，**输出 $x$ 最小的那组**。'
