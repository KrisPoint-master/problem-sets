description: '“彼得·潘框架”是一种装饰文字，每一个字母都是由一个菱形框架。一个彼得·潘框架看起来像这样（`x` 是字母，`#` 是框架）：

  ```

  ..#..

  .#.#.

  #.X.#

  .#.#.

  ..#..

  ```

  然而，只是一个框架会有些沉闷，所以我们每遇到三个字母会把第三个字母用温迪框架把它框起来。温迪框架看起来像这样：

  ```

  ..*..

  .*.*.

  *.X.*

  .*.*.

  ..*..

  ```

  当温迪和彼得·潘的框架重叠时，温迪框架覆盖在上面。 （见样例 3）'
