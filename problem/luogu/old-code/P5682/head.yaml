problem: P5682
title: '[CSP-J 2019 江西] 次大值'
tags:
- 数学
- 排序
description: "Alice 有 $n$ 个正整数，数字从 $1 \\sim n$ 编号，分别为 $a_1,a_2, \\dots , a_n$。  \n\
  Bob 刚学习取模运算，于是便拿这 $n$ 个数进行练习，他写下了所有 \n\n$$a_i \\bmod a_j (1 \\le i,j \\le n \\wedge\
  \ i \\neq j)$$  \n\n的值，其中 $\\bmod$ 表示取模运算。  \n\nAlice 想知道所有的结果中，严格次大值是多少。将取模后得到的所有值进行去重，即相同的结果数值只保留一个，剩余数中第二大的值就称为严格次大值。"
