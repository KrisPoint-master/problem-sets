problem: P1042
title: '[NOIP 2003 普及组] 乒乓球'
tags:
- 模拟
- 字符串
description: '华华通过以下方式进行分析，首先将比赛每个球的胜负列成一张表，然后分别计算在 $11$ 分制和 $21$ 分制下，双方的比赛结果（截至记录末尾）。


  比如现在有这么一份记录，（其中 $\texttt W$ 表示华华获得一分，$\texttt L$ 表示华华对手获得一分）：


  $$\texttt{WWWWWWWWWWWWWWWWWWWWWWLW}$$


  在 $11$ 分制下，此时比赛的结果是华华第一局 $11$ 比 $0$ 获胜，第二局 $11$ 比 $0$ 获胜，正在进行第三局，当前比分 $1$ 比 $1$。而在
  $21$ 分制下，此时比赛结果是华华第一局 $21$ 比 $0$ 获胜，正在进行第二局，比分 $2$ 比 $1$。如果一局比赛刚开始，则此时比分为 $0$ 比
  $0$。直到分差大于或者等于 $2$，才一局结束。


  **注意：当一局比赛结束后，下一局立刻开始**。


  你的程序就是要对于一系列比赛信息的输入（$\texttt{WL}$ 形式），输出正确的结果。'
