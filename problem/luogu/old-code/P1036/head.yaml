description: '已知 $n$ 个整数 $x_1,x_2,\cdots,x_n$，以及 $1$ 个整数 $k$（$k<n$）。从 $n$ 个整数中任选 $k$
  个整数相加，可分别得到一系列的和。例如当 $n=4$，$k=3$，$4$ 个整数分别为 $3,7,12,19$ 时，可得全部的组合与它们的和为：


  $3+7+12=22$


  $3+7+19=29$


  $7+12+19=38$


  $3+12+19=34$


  现在，要求你计算出和为素数共有多少种。


  例如上例，只有一种的和为素数：$3+7+19=29$。'
