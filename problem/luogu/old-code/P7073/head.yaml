problem: P7073
title: '[CSP-J 2020] 表达式'
tags: []
description: '小 C 热衷于学习数理逻辑。有一天，他发现了一种特别的逻辑表达式。在这种逻辑表达式中，所有操作数都是变量，且它们的取值只能为 $0$ 或
  $1$，运算从左往右进行。如果表达式中有括号，则先计算括号内的子表达式的值。特别的，这种表达式有且仅有以下几种运算：

  1. 与运算：`a & b`。当且仅当 $a$ 和 $b$ 的值都为 $1$ 时，该表达式的值为 $1$。其余情况该表达式的值为 $0$。

  2. 或运算：`a | b`。当且仅当 $a$ 和 $b$ 的值都为 $0$ 时，该表达式的值为 $0$。其余情况该表达式的值为 $1$。

  3. 取反运算：`!a`。当且仅当 $a$ 的值为 $0$ 时，该表达式的值为 $1$。其余情况该表达式的值为 $0$。


  小 C 想知道，给定一个逻辑表达式和其中每一个操作数的初始取值后，再取反某一个操作数的值时，原表达式的值为多少。


  为了化简对表达式的处理，我们有如下约定：


  表达式将采用**后缀表达式**的方式输入。


  后缀表达式的定义如下：

  1. 如果 $E$ 是一个操作数，则 $E$ 的后缀表达式是它本身。

  2. 如果 $E$ 是 $E_1~\texttt{op}~E_2$ 形式的表达式，其中 $\texttt{op}$ 是任何二元操作符，且优先级不高于 $E_1$
  、$E_2$ 中括号外的操作符，则 $E$ 的后缀式为 $E_1'' E_2'' \texttt{op}$，其中 $E_1''$ 、$E_2''$ 分别为 $E_1$、$E_2$
  的后缀式。

  3. 如果 $E$ 是 $E_1$ 形式的表达式，则 $E_1$ 的后缀式就是 $E$ 的后缀式。


  同时为了方便，输入中：


  1. 与运算符（&）、或运算符（|）、取反运算符（!）的左右**均有一个空格**，但**表达式末尾没有空格**。

  2. 操作数由小写字母 $x$ 与一个正整数拼接而成，正整数表示这个变量的下标。例如：`x10`，表示下标为 $10$ 的变量 $x_{10}$。数据保证**每个变量在表达式中出现恰好一次**。'
difficulty: 普及+/提高
