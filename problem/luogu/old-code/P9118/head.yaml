description: '小 Ω 在小学数学课上学到了“幂次”的概念：$\forall a, b \in \N^+$，定义 $a^b$ 为 $b$ 个 $a$ 相乘。


  她很好奇有多少正整数可以被表示为上述 $a^b$ 的形式？由于所有正整数 $m \in \N^+$ 总是可以被表示为 $m^1$ 的形式，因此她要求上述的表示中，必须有
  $b \geq k$，其中 $k$ 是她事先选取好的一个正整数。


  因此她想知道在 $1$ 到 $n$ 中，有多少正整数 $x$ 可以被表示为 $x = a^b$ 的形式，其中 $a, b$ 都是正整数，且 $b \geq k$？'
