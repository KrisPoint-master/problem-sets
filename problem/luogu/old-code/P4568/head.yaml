oj: luogu
problem: P4568
title: '[JLOI2011] 飞行路线'
tags:
- 最短路
description: 'Alice 和 Bob 现在要乘飞机旅行，他们选择了一家相对便宜的航空公司。该航空公司一共在 $n$ 个城市设有业务，设这些城市分别标记为
  $0$ 到 $n-1$，一共有 $m$ 种航线，每种航线连接两个城市，并且航线有一定的价格。


  Alice 和 Bob 现在要从一个城市沿着航线到达另一个城市，途中可以进行转机。航空公司对他们这次旅行也推出优惠，他们可以免费在最多 $k$ 种航线上搭乘飞机。那么
  Alice 和 Bob 这次出行最少花费多少？'
difficulty: 普及+/提高
