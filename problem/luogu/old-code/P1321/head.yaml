oj: luogu
problem: P1321
title: 单词覆盖还原
tags:
- 模拟
- 字符串
description: '我有一个长度为 $l$ 的字符串，最开始时，这个字符串由 $l$ 个句号（`.`）组成。


  我在这个字符串中，将多次把 `boy` 或者 `girl` 两单词，依次贴到这个字符串中。


  后贴上单词，会覆盖之前贴上的单词，或者覆盖句号。最终，每个单词至少有一个字符没有被覆盖。


  请问，一共贴有几个 `boy` 几个 `girl`？'
difficulty: 入门
