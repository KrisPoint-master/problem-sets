title: '[USACO20JAN] Word Processor B'
tags:
- 模拟
- 字符串
description: "奶牛 Bessie 正在完成她的写作课的一篇作文。由于她写字很难看，她决定用一个文字处理器来输入这篇作文。\n\n这篇作文共有 $N$\
  \ 个单词（$1\\le N\\le 100$），用空格分隔。每个单词的长度在 $1$ 到 $15$ 之间，仅由大写和小写字母组成。根据作业的要求，这篇作文需要用一种特别的方式排版：每一行包含的字符不超过\
  \ $K$ 个（$1\\le K\\le 80$），空格不计。幸好 Bessie 的文字处理器能够处理这样的要求，它会按照如下的方式：\n\n - 如果 Bessie\
  \ 输入了一个单词，这个单词能够放进当前行，就放在当前行。\n - 否则，将这个单词放到下一行，然后继续向下一行添加单词。\n\n当然，同一行中的单词之间仍然用一个空格分隔。每一行的结尾都不应当有空格。\n\
  \n很不幸，Bessie 的文字处理器刚好坏了。请帮助她正确地排版她的作文！"
difficulty: 入门
